name: Build Native Flutter APK (Artifact Only)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create local.properties
        run: |
          mkdir -p VaultX/android
          echo "flutter.sdk=$FLUTTER_ROOT" > VaultX/android/local.properties
        shell: bash

      - name: Install Dependencies
        working-directory: VaultX
        run: flutter pub get

      - name: Build Release APK
        working-directory: VaultX
        run: flutter build apk --release --no-tree-shake-icons

      # Mengunggah hasil build sebagai Artifact (Bisa didownload di tab Actions)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultX-Pro-APK
          path: VaultX/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7 # Artifact akan otomatis dihapus setelah 7 hari