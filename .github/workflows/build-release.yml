name: Build & Release Native Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# TAMBAHKAN PERMISSIONS INI UNTUK MEMPERBAIKI ERROR 403
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > VaultX/android/local.properties

      - name: Install Dependencies
        working-directory: VaultX
        run: flutter pub get

      - name: Build Release APK
        working-directory: VaultX
        run: flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: VaultX/build/app/outputs/flutter-apk/app-release.apk
          tag_name: "v1.1.${{ github.run_number }}"
          name: "VaultX Native Update (Build ${{ github.run_number }})"
          body: "🚀 Build sukses dengan perbaikan izin 403 dan stabilitas aplikasi."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_CLASSIC }}
      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultX-Native-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: "v1.0.${{ github.run_number }}"
          name: "VaultX Native Update (Build ${{ github.run_number }})"
          body: "🚀 Auto-generated Fully Native APK build sukses."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_CLASSIC }}
