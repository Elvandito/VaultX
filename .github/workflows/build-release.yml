name: Build & Release Native Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create local.properties
        run: |
          mkdir -p VaultX/android
          echo "flutter.sdk=$FLUTTER_ROOT" > VaultX/android/local.properties
        shell: bash

      - name: Install Dependencies
        working-directory: VaultX
        run: flutter pub get

      - name: Build Release APK
        working-directory: VaultX
        run: flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "VaultX/build/app/outputs/flutter-apk/app-release.apk"
          tag_name: "v1.2.${{ github.run_number }}"
          name: "VaultX Native Update (Build ${{ github.run_number }})"
          body: "🚀 Build sukses! File MainActivity.kt telah dibersihkan dari kode Gradle."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_CLASSIC }}