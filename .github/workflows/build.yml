name: Build & Release Native Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode (Update ke v4)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java (Update ke v4)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 4. Ambil Dependencies
      # Jika file pubspec.yaml Anda ada di dalam folder 'vaultx', 
      # ubah line di bawah menjadi: working-directory: vaultx
      - name: Install Dependencies
        run: flutter pub get
        # working-directory: . 

      # 5. Build APK Native Android
      - name: Build Release APK
        run: flutter build apk --release
        # working-directory: .

      # 6. Upload APK sebagai Artifact (Update ke v4)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultX-Native-APK
          path: "**/build/app/outputs/flutter-apk/app-release.apk"

      # 7. Otomatis Membuat Rilis di GitHub
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/build/app/outputs/flutter-apk/app-release.apk"
          tag_name: "v1.0.${{ github.run_number }}"
          name: "VaultX Native Update (Build ${{ github.run_number }})"
          body: "🚀 Auto-generated Fully Native (Flutter) APK build sukses."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_CLASSIC }}