name: vaultx
description: Secure local encryption offline password manager.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Cryptography (Native PBKDF2 & AES-GCM)
  cryptography: ^2.7.0
  
  # QR Code Generation
  qr_flutter: ^4.1.0
  
  # Screenshot & Native Sharing (For CodeSnap feature)
  screenshot: ^2.3.0
  share_plus: ^7.1.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
