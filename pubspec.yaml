name: vaultx
description: Secure local encryption offline password manager.
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  cryptography: ^2.7.0
  qr_flutter: ^4.1.0
  screenshot: ^2.3.0
  share_plus: ^7.1.0
  path_provider: ^2.1.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true